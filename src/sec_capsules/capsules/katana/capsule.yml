id: katana
name: katana
category: web_crawler
summary: Web crawler for collecting URLs and endpoints from scoped web targets.
stage:
  - endpoint_discovery
  - web_recon
risk_level: active_low

best_for:
  - Collect links and endpoints from known in-scope web services.
  - Prepare endpoint candidates for baseline scanners.
  - Preserve crawl evidence as JSONL artifacts.

avoid_when:
  - Authentication context is unclear.
  - Crawling could trigger unwanted state-changing actions.
  - Target scope is not confirmed.

input_schema:
  type: object
  additionalProperties: false
  properties:
    depth:
      type: integer
      description: Maximum crawl depth from the scoped starting URL.
      minimum: 1
      maximum: 5
      x-agent-settable: true
    requests_per_second:
      type: integer
      description: Maximum crawl requests per second for this invocation.
      minimum: 1
      maximum: 10
      x-agent-settable: true

profiles:
  safe:
    description: Depth-limited JSONL crawl for one scoped target.
    active: true
    action: crawling
    requires_approval: false
    defaults:
      depth: 2
      requests_per_second: 10
    allowed_arguments:
      - depth
      - requests_per_second
    command:
      - katana
      - -jsonl
      - -silent
      - -depth
      - $depth
      - -fs
      - fqdn
      - -rate-limit
      - $requests_per_second
      - -u
      - $target

runtime:
  binary: katana
  version_command:
    - katana
    - -version
  max_output_bytes: 1048576

outputs:
  structured:
    - endpoint.v1
    - evidence.v1

artifacts:
  primary: katana.jsonl
  content_type: application/jsonl

model_exposure:
  default: observation_only
  max_tokens: 800

next_actions:
  - run_baseline_scan
  - inspect_interesting_endpoints
