id: nuclei
name: nuclei
category: vulnerability_scanner
summary: Template-based scanner for known CVEs, exposures, and misconfigurations.
stage:
  - vulnerability_scanning
  - baseline_scan
risk_level: active_low_to_medium

best_for:
  - Low-noise baseline vulnerability checks.
  - Known CVE checks.
  - Exposed panels and misconfiguration checks.
  - Evidence-backed finding candidates.

avoid_when:
  - Target scope is not confirmed.
  - Target cannot tolerate automated HTTP requests.
  - Active templates are not approved.
  - Authentication context is unclear.

input_schema:
  type: object
  additionalProperties: false
  properties:
    requests_per_second:
      type: integer
      description: Maximum template requests per second for this invocation.
      minimum: 1
      maximum: 5
      x-agent-settable: true
      x-rate-limit-unit: requests_per_second
    severity:
      type: array
      description: Finding severities enabled by the safe profile.
      minItems: 1
      maxItems: 3
      uniqueItems: true
      items:
        type: string
        enum:
          - medium
          - high
          - critical
      x-agent-settable: true

profiles:
  safe:
    description: Medium-or-higher severity JSONL scan with low rate limit.
    active: true
    action: active_scan
    requires_approval: false
    defaults:
      requests_per_second: 5
      severity:
        - medium
        - high
        - critical
    allowed_arguments:
      - requests_per_second
      - severity
    command:
      - nuclei
      - -jsonl
      - -severity
      - $severity
      - -rl
      - $requests_per_second
      - -u
      - $target
  local_lab:
    description: Single local Juice Shop fingerprint template for the authorized E2E lab.
    active: true
    action: active_scan
    requires_approval: false
    defaults:
      requests_per_second: 5
    allowed_arguments:
      - requests_per_second
    command:
      - nuclei
      - -jsonl
      - -t
      - $capsule_root/templates/local-juice-shop.yaml
      - -it
      - $capsule_root/templates/local-juice-shop.yaml
      - -rl
      - $requests_per_second
      - -u
      - $target

runtime:
  binary: nuclei
  version_command:
    - nuclei
    - -version
  max_output_bytes: 1048576

outputs:
  structured:
    - finding.v1
    - evidence.v1

artifacts:
  primary: nuclei.jsonl
  content_type: application/jsonl

model_exposure:
  default: observation_only
  max_tokens: 800

next_actions:
  - inspect_evidence
  - export_report
  - validate_finding
