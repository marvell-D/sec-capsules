name: crAPI FFUF E2E

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install project
        run: python -m pip install -e .
      - name: Run local crAPI FFUF E2E
        run: scripts/e2e-crapi-ffuf.sh
      - name: Upload run evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crapi-ffuf-e2e-runs
          path: runs-crapi-ffuf-e2e/
          if-no-files-found: warn
