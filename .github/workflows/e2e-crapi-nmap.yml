name: crAPI Nmap E2E

on:
  workflow_dispatch:

jobs:
  crapi-nmap:
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e .
      - name: Run authorized local crAPI Nmap E2E
        run: scripts/e2e-crapi-nmap.sh
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crapi-nmap-e2e-runs
          path: runs-crapi-e2e/
          if-no-files-found: ignore
